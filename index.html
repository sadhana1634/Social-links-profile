<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="profile">
    <img src="assets/images/avatar-jessica.jpeg" alt="image" width="70">
    <h3 id="name">Jessica Randall</h3>
    <p id="address">London, United Kingdom</p>
    <p id="occupation">"Front-end developer and avid reader."</p>
    
    <div class="social-media-links">
      <a href="#" target="_blank"><p class="link">GitHub</p></a>
      <a href="#" target="_blank"><p class="link">Frontend Mentor</p></a>
      <a href="#" target="_blank"><p class="link">LinkedIn</p></a>
      <a href="#" target="_blank"><p class="link">Twitter</p></a>
      <a href="#" target="_blank"><p class="link">Instagram</p></a>
    </div>
  </div>
  
  <div class="attribution">
    <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.</p> <br>
    <p>Coded by <a href="#">Sadhana</a>.</p>
  </div>
</body>
</html>
